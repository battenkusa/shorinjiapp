name: Claude Code Auto Review
on:
  issues:
    types: [labeled]
jobs:
  generate-and-review:
    if: github.event.label.name == 'Claude'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Claude Code
        uses: anthropics/claude-code-action@beta
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
      - name: Install dependencies
        run: pip install anthropic
      - name: Security Review
        run: python .github/scripts/review.py
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      - name: Create PR
        id: create-pr
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          title: "[${{ github.event.issue.title }}] Auto PR"
          body: |
            Closes #${{ github.event.issue.number }}
            Security review passed.
          branch: "feature/issue-${{ github.event.issue.number }}"
          base: main
  wait-for-approval:
    needs: generate-and-review
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Approved
        run: echo "Approved. Merging..."
  merge-pr:
    needs: wait-for-approval
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: write
    steps:
      - name: Merge PR
        uses: actions/github-script@v7
        with:
          script: |
            const prs = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              head: `feature/issue-${{ github.event.issue.number }}`,
              state: 'open'
            });
            if (prs.data.length > 0) {
              await github.rest.pulls.merge({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: prs.data[0].number,
                merge_method: 'squash'
              });
              console.log('Merged!');
            }